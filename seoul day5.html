<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>首爾Day 5</title>
<style>
  
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans CJK TC', 'WenQuanYi Micro Hei', 'Microsoft JhengHei', Arial, sans-serif;
    background: #0D0D1A; min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 24px 16px;
  }
  .card {
    width: 100%; max-width: 420px; background: #13131F;
    border-radius: 24px; overflow: hidden;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 32px 80px rgba(0,0,0,0.6);
  }
  .header {
    background: linear-gradient(135deg, #0d1a2e 0%, #0d2240 50%, #0d1a2e 100%);
    padding: 28px 24px 22px; position: relative; overflow: hidden;
  }
  .header::before {
    content: ''; position: absolute; top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(80,160,255,0.25) 0%, transparent 70%);
    border-radius: 50%;
  }
  .day-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(80,160,255,0.15); border: 1px solid rgba(80,160,255,0.35);
    color: #80b8ff; font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
    padding: 4px 12px; border-radius: 20px; margin-bottom: 10px;
  }
  .day-title { font-size: 22px; font-weight: 900; color: #fff; line-height: 1.3; margin-bottom: 6px; }
  .day-date { font-size: 13px; color: rgba(255,255,255,0.5); }
  .meta-bar {
    display: flex; gap: 16px; padding: 14px 24px;
    background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap;
  }
  .meta-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,0.5); }
  .timeline { padding: 16px 24px 24px; }
  .event { display: flex; gap: 16px; position: relative; padding-bottom: 20px; }
  .event:last-child { padding-bottom: 0; }
  .event:not(:last-child)::before {
    content: ''; position: absolute; left: 37px; top: 36px; bottom: 0;
    width: 1px; background: linear-gradient(to bottom, rgba(80,160,255,0.3), transparent);
  }
  .time-col { width: 52px; flex-shrink: 0; text-align: right; }
  .time { font-size: 12px; font-weight: 700; color: #50a0ff; letter-spacing: 0.02em; padding-top: 2px; }
  .dot-col { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; }
  .dot {
    width: 12px; height: 12px; border-radius: 50%; background: #50a0ff;
    border: 2px solid #0d2240; box-shadow: 0 0 10px rgba(80,160,255,0.5);
    margin-top: 3px; flex-shrink: 0;
  }
  .content { flex: 1; min-width: 0; }
  .event-name { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 5px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .event-emoji { font-size: 16px; }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
  .tag { font-size: 11px; padding: 3px 8px; border-radius: 6px; font-weight: 500; }
  .tag-highlight { background: rgba(255,215,0,0.12); color: #ffd700; border: 1px solid rgba(255,215,0,0.2); }
  .tag-tip { background: rgba(100,200,255,0.1); color: #80d4ff; border: 1px solid rgba(100,200,255,0.2); }
  .tag-alert { background: rgba(255,80,80,0.12); color: #ff9090; border: 1px solid rgba(255,80,80,0.2); }
  .event-desc { font-size: 12px; color: rgba(255,255,255,0.45); line-height: 1.6; margin-top: 4px; }
  .note-box {
    background: rgba(80,160,255,0.07); border: 1px solid rgba(80,160,255,0.2);
    border-radius: 10px; padding: 10px 14px; margin-top: 6px;
  }
  .note-box p { font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.7; }
  .star { color: #ffd700; }

  .farewell-box {
    background: linear-gradient(135deg, rgba(80,160,255,0.1), rgba(147,112,219,0.1));
    border: 1px solid rgba(80,160,255,0.25);
    border-radius: 14px;
    padding: 16px 18px;
    margin-top: 20px;
    text-align: center;
  }
  .farewell-box .emoji { font-size: 28px; margin-bottom: 8px; }
  .farewell-box p { font-size: 13px; color: rgba(255,255,255,0.6); line-height: 1.8; }
  .farewell-box strong { color: #80b8ff; font-weight: 700; }

  .footer {
    background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.05);
    padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
  }
  .footer-text { font-size: 11px; color: rgba(255,255,255,0.3); }
  .page-num { font-size: 11px; color: rgba(80,160,255,0.8); font-weight: 700; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="day-badge">✈️ DAY 5</div>
    <div class="day-title">完美賦歸<br>滿載而歸</div>
    <div class="day-date">7 / 1（三）</div>
  </div>

  <div class="meta-bar">
    <div class="meta-item"><span>✈️</span>12:00 班機</div>
    <div class="meta-item"><span>🚇</span>孔德站搭 AREX 直達機場</div>
  </div>

  <div class="timeline">

    <div class="event">
      <div class="time-col"><div class="time">09:00</div></div>
      <div class="dot-col"><div class="dot"></div></div>
      <div class="content">
        <div class="event-name"><span class="event-emoji">🥪</span>Eggdrop 早餐</div>
        <div class="event-desc">在飯店附近購買，享受最後早晨時光</div>
        <div class="note-box">
          <p><span class="star">⭐</span> 必吃：招牌鐵板吐司<br>首爾最後一餐，好好品嚐！</p>
        </div>
        <div class="tags">
          <span class="tag tag-highlight">招牌鐵板吐司</span>
          <span class="tag tag-tip">飯店附近</span>
        </div>
      </div>
    </div>

    <div class="event">
      <div class="time-col"><div class="time">09:30</div></div>
      <div class="dot-col"><div class="dot"></div></div>
      <div class="content">
        <div class="event-name"><span class="event-emoji">🧳</span>行李打包 & 退稅</div>
        <div class="event-desc">整理戰利品、確認退稅文件，退房手續</div>
        <div class="tags"><span class="tag tag-alert">退稅文件確認</span></div>
      </div>
    </div>

    <div class="event">
      <div class="time-col"><div class="time">10:00</div></div>
      <div class="dot-col"><div class="dot"></div></div>
      <div class="content">
        <div class="event-name"><span class="event-emoji">🚇</span>前往仁川機場</div>
        <div class="event-desc">從孔德站搭乘 AREX 直達機場</div>
        <div class="tags">
          <span class="tag tag-alert">12:00 班機登機</span>
          <span class="tag tag-tip">預留 2 小時</span>
        </div>
      </div>
    </div>

  </div>

  <div class="farewell-box">
    <div class="emoji">🇰🇷✨</div>
    <p>5天4夜首爾之旅圓滿落幕<br><strong>滿載著回憶、伴手禮與幸福感</strong><br>準備登機，下次再見首爾！</p>
  </div>

  <div class="footer">
    <div class="footer-text">首爾 5 天 4 夜</div>
    <div class="page-num">5 / 5</div>
  </div>
</div>
</body>
</html>
