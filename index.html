<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首爾旅遊行程</title>
    <style>
        /* --- 基礎版面設定 --- */
        body {
            font-family: 'Helvetica Neue', Arial, 'LiHei Pro', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            background-color: #ffffff; /* 配合大多數網頁的乾淨底色 */
            /* 使用 100dvh 解決手機瀏覽器上下工具列導致畫面被切掉的問題 */
            height: 100vh; /* 給舊瀏覽器的備案 */
            height: 100dvh; 
            overflow: hidden;
        }

        /* --- 手機版專屬頂部導覽列 --- */
        .mobile-header {
            display: none;
            background-color: #ffffff;
            color: #333;
            padding: 12px 15px;
            align-items: center;
            border-bottom: 1px solid #eaeaea; /* 乾淨的底線取代厚重陰影 */
            z-index: 10;
        }

        .mobile-header h1 {
            margin: 0 0 0 15px;
            font-size: 18px;
            font-weight: 600;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #333;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
        }

        /* --- 遮罩層 --- */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 15;
            transition: opacity 0.3s;
        }

        /* --- 左側選單設計 --- */
        .sidebar {
            width: 250px;
            background-color: #fcfcfc;
            padding: 20px;
            border-right: 1px solid #eaeaea; /* 改用細線取代陰影，風格更現代 */
            display: flex;
            flex-direction: column;
            z-index: 20;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar h2 {
            margin-top: 0;
            font-size: 18px;
            color: #222;
            padding-bottom: 15px;
            border-bottom: 1px solid #ddd;
        }

        .tabs {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .tabs button {
            padding: 12px 15px;
            background-color: transparent;
            color: #555;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            text-align: left;
            transition: all 0.2s;
            font-weight: 500;
        }

        .tabs button:hover {
            background-color: #f0f0f0;
            color: #000;
        }

        .tabs button.active {
            background-color: #333; /* 質感黑，非常百搭 */
            color: white;
        }

        /* --- 關閉側邊欄按鈕 --- */
        .close-btn {
            display: none;
            background: none;
            border: none;
            color: #666;
            font-size: 26px;
            cursor: pointer;
            align-self: flex-end;
            margin-bottom: 5px;
        }

        /* --- 右側 iframe 顯示區 --- */
        .main-content {
            flex-grow: 1;
            /* 將 padding 設為 0，讓您的 day1.html 完全貼邊，風格完美融合 */
            padding: 0; 
            display: flex;
            flex-direction: column;
            background-color: transparent; 
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            flex-grow: 1; /* 彈性填滿，確保底部不被切斷 */
        }

        /* =========================================
           手機版 RWD 響應式設定
           ========================================= */
        @media (max-width: 768px) {
            body {
                flex-direction: column; 
            }

            .mobile-header {
                display: flex; 
            }

            .main-content {
                /* 手機版同樣 0 邊距 */
                padding: 0; 
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100dvh; /* 確保選單也不會被切掉 */
                transform: translateX(-100%); 
            }

            .sidebar.open {
                transform: translateX(0); 
            }

            .close-btn {
                display: block; 
            }

            .overlay.show {
                display: block; 
            }
        }
    </style>
</head>
<body>

    <div class="mobile-header">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <h1>行程總覽</h1>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <button class="close-btn" onclick="toggleSidebar()">×</button>
        <h2>首爾自由行</h2>
        <div class="tabs">
            <button class="tab-btn active" onclick="changeDay('day1.html', this)">Day 1</button>
            <button class="tab-btn" onclick="changeDay('day2.html', this)">Day 2</button>
            <button class="tab-btn" onclick="changeDay('day3.html', this)">Day 3</button>
            <button class="tab-btn" onclick="changeDay('day4.html', this)">Day 4</button>
            <button class="tab-btn" onclick="changeDay('day5.html', this)">Day 5</button>
        </div>
    </div>

    <div class="main-content">
        <iframe id="schedule-frame" src="day1.html" title="每日行程"></iframe>
    </div>

    <script>
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        function changeDay(fileName, clickedButton) {
            document.getElementById('schedule-frame').src = fileName;

            let buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            clickedButton.classList.add('active');

            if (window.innerWidth <= 768) {
                toggleSidebar();
            }
        }
    </script>
</body>
</html>
